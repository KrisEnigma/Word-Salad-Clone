<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline' https: data:; style-src 'self' 'unsafe-inline' https:; script-src 'self' 'unsafe-inline' https:;">
    <title>Tablero 4x4</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        /* Estilo inicial para prevenir FOUC */
        .js-loading {
            visibility: hidden;
            opacity: 0;
        }
        
        .js-loading-overlay {
            position: fixed;
            inset: 0;
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.3s ease-out;
        }

        .js-loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .js-loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #ffffff33;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="js-loading">
    <div class="js-loading-overlay">
        <div class="js-loading-spinner"></div>
    </div>
    <div class="toolbar">
        <button class="menu">
            <div></div>
        </button>
        <div class="level-number"></div>
        <div class="timer"></div>
    </div>
    <div class="game-container">
        <h1 class="title" style="user-select: text; -webkit-user-select: text;"></h1>
        <div class="board"></div>
        <div class="word-list"></div>
    </div>
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h2>Menú</h2>
            <div class="menu-options">
                <button id="theme-button">Cambiar Tema</button>
                <button id="reset-game">Reiniciar Nivel</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="theme-modal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="back-button">
                    <div class="arrow-left"></div>
                </button>
                <h2>Temas</h2>
            </div>
            <div class="theme-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="victory-modal">
        <canvas id="confetti-canvas"></canvas>
        <div class="modal-content">
            <h2>¡Nivel Completado!</h2>
            <p class="victory-time">Tiempo: <span id="final-time"></span></p>
            <div class="menu-options">
                <button id="restart-level">Reiniciar Nivel</button>
                <button id="next-level">Siguiente Nivel</button>
            </div>
        </div>
    </div>

    <script src="js/game.js" type="module"></script>
</body>

</html>
